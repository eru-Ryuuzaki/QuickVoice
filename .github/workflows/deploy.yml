name: Deploy QuickVoice

on:
  push:
    branches: ["master"]

env:
  REGISTRY_URL: ${{ vars.REGISTRY_URL || 'crpi-c8pkxwwubdfz6rtn.cn-shanghai.personal.cr.aliyuncs.com' }}
  IMAGE_NAME_APP: ${{ vars.IMAGE_NAME_APP || 'crpi-c8pkxwwubdfz6rtn.cn-shanghai.personal.cr.aliyuncs.com/ryuuzaki/quickvoice' }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/root/quickvoice' }}
  APP_URL: ${{ vars.APP_URL || 'https://quickvoice.ryuuzaki.top' }}
  TTS_PROVIDER: ${{ vars.TTS_PROVIDER || 'microsoft_unofficial' }}
  STT_PROVIDER: ${{ vars.STT_PROVIDER || 'siliconflow' }}
  ENABLE_STT: ${{ vars.ENABLE_STT || 'true' }}
  ENABLE_PUBLIC_STT: ${{ vars.ENABLE_PUBLIC_STT || 'true' }}
  ENABLE_STT_SILICONFLOW: ${{ vars.ENABLE_STT_SILICONFLOW || 'true' }}
  ENABLE_STT_VOSK: ${{ vars.ENABLE_STT_VOSK || 'true' }}
  VOSK_WS_URL: ${{ vars.VOSK_WS_URL || 'ws://vosk-cn:2700' }}
  SILICONFLOW_STT_MODEL: ${{ vars.SILICONFLOW_STT_MODEL || 'FunAudioLLM/SenseVoiceSmall' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and Push Application Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_APP }}:latest
            ${{ env.IMAGE_NAME_APP }}:${{ github.sha }}

      - name: Create runtime .env file
        run: |
          echo "PORT=4003" >> .env
          echo "APP_URL=${{ env.APP_URL }}" >> .env
          echo "TTS_PROVIDER=${{ env.TTS_PROVIDER }}" >> .env
          echo "STT_PROVIDER=${{ env.STT_PROVIDER }}" >> .env
          echo "ENABLE_STT=${{ env.ENABLE_STT }}" >> .env
          echo "ENABLE_PUBLIC_STT=${{ env.ENABLE_PUBLIC_STT }}" >> .env
          echo "ENABLE_STT_SILICONFLOW=${{ env.ENABLE_STT_SILICONFLOW }}" >> .env
          echo "ENABLE_STT_VOSK=${{ env.ENABLE_STT_VOSK }}" >> .env
          echo "VOSK_WS_URL=${{ env.VOSK_WS_URL }}" >> .env
          echo "SILICONFLOW_API_KEY=${{ secrets.SILICONFLOW_API_KEY }}" >> .env
          echo "SILICONFLOW_STT_MODEL=${{ env.SILICONFLOW_STT_MODEL }}" >> .env

      - name: Copy deployment assets to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.prod.yml,.env"
          target: "${{ env.DEPLOY_PATH }}/"

      - name: SSH to Server and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "Login to container registry..."
            docker login --username=${{ secrets.ALIYUN_REGISTRY_USER }} --password=${{ secrets.ALIYUN_REGISTRY_PASSWORD }} ${{ env.REGISTRY_URL }}

            cd ${{ env.DEPLOY_PATH }}

            export IMAGE_NAME_APP=${{ env.IMAGE_NAME_APP }}:latest

            echo "Pull latest images..."
            docker compose -f docker-compose.prod.yml pull

            echo "Recreate services..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Prune stale images..."
            docker image prune -f
