name: Deploy QuickVoice

on:
  push:
    branches: ["master"]

env:
  REGISTRY_URL: crpi-c8pkxwwubdfz6rtn.cn-shanghai.personal.cr.aliyuncs.com
  IMAGE_NAME_APP: crpi-c8pkxwwubdfz6rtn.cn-shanghai.personal.cr.aliyuncs.com/ryuuzaki/quickvoice

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: ${{ secrets.ALIYUN_REGISTRY_USER }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and Push Application Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_APP }}:latest
            ${{ env.IMAGE_NAME_APP }}:${{ github.sha }}

      - name: Create runtime .env file
        run: |
          echo "PORT=4003" >> .env
          echo "APP_URL=https://quickvoice.ryuuzaki.top" >> .env
          echo "TTS_PROVIDER=microsoft_unofficial" >> .env
          echo "STT_PROVIDER=siliconflow" >> .env
          echo "ENABLE_STT=true" >> .env
          echo "ENABLE_PUBLIC_STT=true" >> .env
          echo "SILICONFLOW_API_KEY=${{ secrets.SILICONFLOW_API_KEY }}" >> .env
          echo "SILICONFLOW_STT_MODEL=FunAudioLLM/SenseVoiceSmall" >> .env

      - name: Copy deployment assets to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.prod.yml,.env"
          target: "/root/quickvoice/"

      - name: SSH to Server and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "Login to container registry..."
            docker login --username=${{ secrets.ALIYUN_REGISTRY_USER }} --password=${{ secrets.ALIYUN_REGISTRY_PASSWORD }} ${{ env.REGISTRY_URL }}

            cd /root/quickvoice

            export IMAGE_NAME_APP=${{ env.IMAGE_NAME_APP }}:latest

            echo "Pull latest image..."
            docker compose -f docker-compose.prod.yml pull

            echo "Recreate service..."
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            echo "Prune stale images..."
            docker image prune -f
